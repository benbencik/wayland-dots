

# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=DP-1,1920x1080,0x0,1 # left monitor notebook
monitor=DP-2,2560x1440,1920x0,1
monitor=DP-3,1920x1080@60,3840x0,1
monitor=DP-5,1920x1080@60,3840x0,1

monitor=DP-6,1920x1080@60,1920x0,1
monitor=DP-4,1920x1080@60,1920x0,1

# monitor=HDMI-A-1,1280x1024@75,1920x0,1
# monitor=HDMI-A-1,1920x1080,1920x0,1
monitor=HDMI-A-1,2048x1280,2048x0,1
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = $HOME/wayland-dots/hypr/bemenu-color-run.sh


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
exec-once = nm-applet &
exec-once = mako -c ~/.config/mako/config
exec-once = waybar & hyprpaper
exec-once = conky
exec-once = hypridle
exec-once = hyprctl setcursor everforest-cursors-light 25 
exec-once = sh -c '~/Code/open-source/darkfi/darkirc > ~/Code/open-source/darkfi/.darkirc.log 2>&1'

exec-once = [workspace 1 silent] firefox
exec-once = [workspace 7 silent] obsidian

# Tile 2x2 terminals on workspace 8
exec-once = ~/.config/home-manager/startup_terminal.sh
windowrule = workspace 8 silent, match:class grid_terminal

# Your other exec-once commands
exec-once = [workspace 9 silent] signal-desktop


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = HYPRCURSOR_THEME,everforest-cursors-light
env = HYPRCURSOR_SIZE,25

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 4
    gaps_out = 5

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgb(71ADE9)
    col.inactive_border = rgb(cedaeb)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 1

    # drop_shadow = false
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.2
        new_optimizations = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = false

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 2, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,sk
    kb_variant = ,qwerty
    kb_options = grp:alt_shift_toggle
    kb_model =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.6 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
binds = Control_L&Alt_L, T, exec, kitty # just in case I break something
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exit,
# bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind=SUPER,TAB,workspace,previous

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, X, movewindow

# Move to monitor
bind = $mainMod, comma, movecurrentworkspacetomonitor, l 
bind = $mainMod, period, movecurrentworkspacetomonitor, r 

# Volume Control
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5  # Increase volume by 5%
bind = , XF86AudioLowerVolume, exec, pamixer -d 5  # Decrease volume by 5%
bind = , XF86AudioMute, exec, pamixer -t           # Toggle mute

# Brightness Control
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%  # Increase brightness
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-  # Decrease brightness

# Media Controls
bind = , XF86AudioPlay, exec, playerctl play-pause # Play/Pause media
bind = , XF86AudioNext, exec, playerctl next        # Next track
bind = , XF86AudioPrev, exec, playerctl previous    # Previous track

# Restart waybar hyprctl
bind = $mainMod Shift, R, exec, pkill waybar && waybar && hyprctl reload

# Set orientation
bind = $mainMod, h, layoutmsg, orientationhorizontal
bind = $mainMod, v, layoutmsg, orientationvertical

# Window movement
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r


# Fullscreen
bind=$mainMod,F,fullscreen

# Screenshot
bind = SHIFT, Print, exec, grim -g "$(slurp)" # Screenshot selected area (saved to file)
bind = , Print, exec, grim # Screenshot entire screen (saved to file)
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy # Screenshot selected area to clipboard
bind = $mainMod, Print, exec, grim - | wl-copy # Screenshot entire screen to clipboard

# bindl= ,switch:Lid Switch, exec, hyprlock 

###############
### SUBMAPS ###
###############

# Power menu
bind = $mainMod, 0, submap, power-menu
submap = power-menu
bind = , l, exec, hyprlock
bind = , l, submap, reset
bind = , s, exec, hyprlock & systemctl suspend
bind = , s, submap, reset
bind = , r, exec, systemctl reboot
bind = Shift, s, exec, systemctl poweroff
bind = , escape, submap, reset
bind = $mainMod, 0, submap, reset
submap = reset

# Resize with arrow keys
bind = $mainMod, r, submap, resize
submap = resize
bind = , left, resizeactive, -20 0
bind = , right, resizeactive, 20 0
bind = , up, resizeactive, 0 -20
bind = , down, resizeactive, 0 20
bind = , escape, submap, reset
bind = $mainMod, r, submap, reset
submap = reset


# Wallpaper menu
bind = $mainMod, w, submap, wallpaper-menu
submap = wallpaper-menu
bind = , 1, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 1; hyprctl dispatch submap reset'
bind = , 2, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 2; hyprctl dispatch submap reset'
bind = , 3, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 3; hyprctl dispatch submap reset'
bind = , 4, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 4; hyprctl dispatch submap reset'
bind = , 5, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 5; hyprctl dispatch submap reset'
bind = , 6, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 6; hyprctl dispatch submap reset'
bind = , 7, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 7; hyprctl dispatch submap reset'
bind = , 8, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 8; hyprctl dispatch submap reset'
bind = , 9, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 9; hyprctl dispatch submap reset'
bind = , 0, exec, sh -c '$HOME/wayland-dots/hypr/set-wallpaper-all.sh 0; hyprctl dispatch submap reset'
bind = , escape, submap, reset
submap = reset

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule = opacity 1 override, match:class firefox
windowrule = opacity 1 override, match:class Code
windowrule = opacity 1 override, match:class obsidian
windowrule = opacity 0.8 override, match:class signal
windowrule = opacity 0.8 override, match:class kitty
windowrule = opacity 0.8 override, match:class grid_terminal
