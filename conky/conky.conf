conky.config = {
    -- Window Settings
    alignment = 'top_left',
    gap_x = 30,
    gap_y = 30,
    minimum_width = 280,
    minimum_height = 450,
    
    -- Wayland Specifics
    out_to_x = false,
    out_to_wayland = true,
    background = false,
    double_buffer = true,
    
    -- Visual & Transparency
    own_window = true,
    own_window_type = 'dock',
    own_window_class = 'Conky',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    
    -- Multi-monitor support
    xinerama_head = 0,  -- Set to 0 for all monitors, or specific number (1, 2, etc.) for one monitor
    own_window_transparent = false,
    own_window_argb_visual = false,
    own_window_argb_value = 255,
    own_window_colour = '#232a2e',  -- Slightly lighter dark background
    
    -- Styling
    border_inner_margin = 16,
    border_outer_margin = 2,
    draw_shades = false,
    draw_borders = true,
    
    -- Fonts & Colors
    font = 'JetBrains Mono Nerd Font:weight=Bold:size=9',
    use_xft = true,
    
    -- Everforest Color Palette
    default_color = '#c9be9e',  -- Slightly darker cream for better contrast
    color1 = '#a7c080',         -- Green headers
    color2 = '#9da9a0',         -- Grey labels (was aqua)
    color3 = '#e67e80',         -- Red accents
    color4 = '#d699b6',         -- Purple highlights
    color5 = '#dbbc7f',         -- Yellow accents
    
    -- Refresh
    update_interval = 2.0,
}

conky.text = [[
${alignc}${font :weight=Bold:size=22}${color1}${time %H:%M}${font}
${alignc}${font :size=10}${color2}${time %A, %d %B}${font}
${voffset 10}
${color1}${font :weight=Bold:size=10}  SYSTEM ${hr 2}${font}
# ${color2}${voffset 3}Host ${alignr}${color}${nodename}
${color2}Kernel ${alignr}${color}${kernel}
# ${color2}Gen ${alignr}${color}#${execi 3600 readlink /nix/var/nix/profiles/system | cut -d- -f2}
${color2}Nix Store ${alignr}${color}${execi 3600 du -sh /nix/store | cut -f1}
${color2}Uptime ${alignr}${color}${uptime_short}
${voffset 8}
${color1}${font :weight=Bold:size=10}  RESOURCES ${hr 2}${font}
${color2}${voffset 3}CPU ${alignr}${color}${cpu}% ${color4}${acpitemp}°C
${color3}${cpubar 5}
${color2}${voffset 2}RAM ${alignr}${color}${memperc}% ${color2}${mem}/${memmax}
${color3}${membar 5}
${color2}${voffset 3}Root ${alignr}${color}${fs_used_perc /}% ${color2}${fs_used /}/${fs_size /}
${color4}${fs_bar 5 /}
# ${voffset 8}
# ${color1}${font :weight=Bold:size=10}  STORAGE ${hr 2}${font}
# ${color2}${voffset 2}Read ${alignr}${color}${diskio_read} ${color2}(${diskio nvme0n1})
# ${color2}Write ${alignr}${color}${diskio_write}
# ${color2}${voffset 2}I/O ${alignr}${color}${diskio}
${voffset 8}
${color1}${font :weight=Bold:size=10}  PROCESSES ${hr 2}${font}
${color2}${voffset 2}Load ${alignr}${color}${loadavg 1} ${loadavg 2} ${loadavg 3}
${color2}Processes ${alignr}${color}${processes} (${running_processes} running)
${color5}${voffset 3}${font :size=8}NAME ${alignr}CPU% MEM%${font}
${color}${top name 1} ${alignr}${top cpu 1} ${top mem 1}
${color}${top name 2} ${alignr}${top cpu 2} ${top mem 2}
${color}${top name 3} ${alignr}${top cpu 3} ${top mem 3}
${color}${top name 4} ${alignr}${top cpu 4} ${top mem 4}
${voffset 8}
${color1}${font :weight=Bold:size=10}  NETWORK ${hr 2}${font}
${if_existing /sys/class/net/wlp3s0/operstate up}
${color2}${voffset 3}SSID ${alignr}${color}${wireless_essid wlp3s0}
${color2}Signal ${alignr}${color}${wireless_link_qual_perc wlp3s0}% ${color2}${addr wlp3s0}
${color2}${voffset 2}Down ${alignr}${color}${downspeed wlp3s0} ${color2}${totaldown wlp3s0}
${color2}${downspeedgraph wlp3s0 24,280 7fbbb3 a7c080 -t}
${color2}${voffset 1}Up ${alignr}${color}${upspeed wlp3s0} ${color2}${totalup wlp3s0}
${color3}${upspeedgraph wlp3s0 24,280 e67e80 d699b6 -t}
${else}
${color3}${voffset 3}Wi-Fi Disconnected
${endif}
]]