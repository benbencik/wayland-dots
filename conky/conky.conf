conky.config = {
    -- Window Settings
    alignment = 'top_left',
    gap_x = 30,
    gap_y = 30,
    minimum_width = 280,
    minimum_height = 450,
    
    -- Wayland Specifics
    out_to_x = false,
    out_to_wayland = true,
    background = false,
    double_buffer = true,
    
    -- Visual & Transparency
    own_window = true,
    own_window_type = 'override',
    own_window_class = 'Conky',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    
    -- Multi-monitor support
    xinerama_head = 0,  -- Set to 0 for all monitors, or specific number (1, 2, etc.) for one monitor
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_colour = '#dfe6ee',  -- Light fallback color when transparency is unavailable
    
    -- Styling
    border_inner_margin = 16,
    border_outer_margin = 2,
    draw_shades = false,
    draw_borders = true,
    
    -- Fonts & Colors
    font = 'JetBrains Mono Nerd Font:weight=Bold:size=9',
    use_xft = true,
    
    
    -- Theme Colors (descriptive names)
    default_color = '#cedaeb',  -- foreground: main text
    color1 = '#71ADE9',         -- url_color: section headers (blue)
    color2 = '#9098a4',         -- color8: labels (muted gray)
    color3 = '#E59DB1',         -- color3: bars and accents (pink)
    color4 = '#AB8CAE',         -- color2: highlights (purple)
    color5 = '#8BB8E9',         -- active_tab_background: special accents (light blue)
    
    -- Refresh
    update_interval = 2.0,
}

conky.text = [[
${alignc}${font :weight=Bold:size=22}${color1}${time %H:%M}${font}
${alignc}${font :size=10}${color2}${time %A, %d %B}${font}
${voffset 10}
${color1}${font :weight=Bold:size=10}  SYSTEM ${hr 2}${font}
${color2}Kernel ${alignr}${color}${kernel}
${color2}Nix Store ${alignr}${color}${execi 3600 du -sh /nix/store | cut -f1}
${color2}Generations ${alignr}${color}${execi 3600 nix-env --list-generations | wc -l}
${color2}Packages ${alignr}${color}${execi 3600 sh -c 'nix profile list 2>/dev/null | tail -n +2 | wc -l || nix-env --query --installed | wc -l'}
${color2}Uptime ${alignr}${color}${uptime_short}
${voffset 6}

# resources
${color1}${font :weight=Bold:size=10}  RESOURCES ${hr 2}${font}
${color2}${voffset 3}CPU ${alignr}${color}${acpitemp}°C
${color3}${cpubar 5}
${color2}${voffset 2}RAM ${alignr}${color}${mem}/${memmax}
${color3}${membar 5}
${color2}${voffset 3}Root ${alignr}${color}${fs_used /}/${fs_size /}
${color4}${fs_bar 5 /}
${voffset 6}

# processes
${color1}${font :weight=Bold:size=10}  PROCESSES ${hr 2}${font}
${color2}${voffset 2}Load (1m/5m/15m) ${alignr}${color}${loadavg 1} ${loadavg 2} ${loadavg 3}
${color2}Processes ${alignr}${color}${execi 2 ps -e --no-headers | wc -l}
${color5}${voffset 3}${font :size=9:style=Italic}NAME ${alignr}CPU% MEM%${font}
${color}${top name 1} ${alignr}${top cpu 1} ${top mem 1}
${color}${top name 2} ${alignr}${top cpu 2} ${top mem 2}
${color}${top name 3} ${alignr}${top cpu 3} ${top mem 3}
${color}${top name 4} ${alignr}${top cpu 4} ${top mem 4}
${voffset 6}

# network
${color1}${font :weight=Bold:size=10}  NETWORK ${hr 2}${font}
${if_existing /sys/class/net/wlp3s0/operstate up}
${color2}SSID ${alignr}${color}${wireless_essid wlp3s0}
${color2}Signal ${alignr}${color}${wireless_link_qual_perc wlp3s0}%
${color2}Bitrate  ${alignr}${color}${wireless_bitrate wlp3s0}
${color2}IP Address ${alignr}${color}${addr wlp3s0}
${color2}${voffset 2}Down ${alignr}${color}${downspeed wlp3s0}
${color2}${downspeedgraph wlp3s0 24,280 7fbbb3 a7c080 -t}
${color2}${voffset 1}Up ${alignr}${color}${upspeed wlp3s0}
${color3}${upspeedgraph wlp3s0 24,280 e67e80 d699b6 -t}
${else}
${color3}${voffset 3}Wi-Fi Disconnected
${endif}
]]